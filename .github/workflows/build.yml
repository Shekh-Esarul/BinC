name: Build IBMOVS Chat ESP32-S3-Zero

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Configure Board Manager
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install ESP32 Core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install Libraries
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "U8g2"
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "WebSockets"

      - name: Prepare Sketch Folder
        run: |
          # Agar 'sketch' folder nahi hai, toh dhoondो aur banao
          if [ ! -f "sketch/sketch.ino" ]; then
            echo "Standard structure not found. Searching for .ino file..."
            FILE=$(find . -maxdepth 2 -name "*.ino" | head -n 1)
            if [ -n "$FILE" ]; then
              echo "Found sketch at $FILE. Setting up folder..."
              mkdir -p sketch
              cp "$FILE" sketch/sketch.ino
            else
              echo "Error: No .ino file found!"
              exit 1
            fi
          else
            echo "Standard 'sketch/sketch.ino' structure detected. Skipping copy."
          fi

      - name: Compile Sketch
        run: |
          arduino-cli compile \
            --fqbn "esp32:esp32:esp32s3:CDCOnBoot=cdc,USBMode=hwcdc,FlashSize=4M,PartitionScheme=default,FlashFreq=80M,FlashMode=qio" \
            --output-dir build \
            ./sketch

      - name: List build output
        run: ls -lh build/

      - name: Rename BIN files
        run: |
          if [ -d build ]; then
            cd build
            for f in *.bin; do
              mv "$f" "IBMOVS_v3_${f}"
            done
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IBMOVS-Chat-v3-Bins
          path: build/*.bin
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## ✅ Build Complete" >> $GITHUB_STEP_SUMMARY
          if [ -d build ]; then
            for f in build/*.bin; do
              name=$(basename "$f")
              size=$(du -h "$f" | cut -f1)
              echo "- $name ($size)" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "Build directory not found!" >> $GITHUB_STEP_SUMMARY
          fi
