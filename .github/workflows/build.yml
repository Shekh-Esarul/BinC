name: Build IBMOVS Chat ESP32-S3-Zeroxx

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Configure Board Manager
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install ESP32 Core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install Libraries
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "U8g2"
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "WebSockets"

      - name: Prepare Sketch Folder
        run: |
          mkdir -p sketch
          # Looks for your file and renames it to sketch.ino for the compiler
          if [ -f IBMOVS_Chat_v3.ino ]; then
            cp IBMOVS_Chat_v3.ino sketch/sketch.ino
          else
            echo "Error: IBMOVS_Chat_v3.ino not found!"
            exit 1
          fi

      - name: Compile Sketch
        run: |
          # Fixed FQBN: Changed FlashFreq=80 to FlashFreq=80M
          # This matches the expected enumeration for the ESP32-S3 board definition
          arduino-cli compile \
            --fqbn "esp32:esp32:esp32s3:CDCOnBoot=cdc,USBMode=hwcdc,FlashSize=4M,PartitionScheme=default,FlashFreq=80M,FlashMode=qio" \
            --output-dir build \
            ./sketch

      - name: List build output
        run: ls -lh build/

      - name: Rename BIN files
        run: |
          cd build
          for f in *.bin; do
            mv "$f" "IBMOVS_v3_${f}"
          done
          ls -lh

      - name: Upload Artifacts
        uses: upload-artifact@v4
        with:
          name: IBMOVS-Chat-v3-Bins
          path: build/*.bin
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## ✅ Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Address | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|------|" >> $GITHUB_STEP_SUMMARY
          for f in build/*.bin; do
            name=$(basename "$f")
            size=$(du -h "$f" | cut -f1)
            if   [[ "$name" == *"bootloader"* ]]; then addr="0x0000"
            elif [[ "$name" == *"partition"* ]];  then addr="0x8000"
            else addr="0x10000"; fi
            echo "| $name | \`$addr\` | $size |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Flash Instructions" >> $GITHUB_STEP_SUMMARY
          echo "Use the addresses listed above with esptool.py or the ESP Flash Download Tool." >> $GITHUB_STEP_SUMMARY
