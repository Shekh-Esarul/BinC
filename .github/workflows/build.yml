name: ESP32-S3 Firmware Build (Stable Final)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────
      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      # ─────────────────────────────
      - name: Setup ESP32 Core (FIXED VERSION)
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.17

      # ─────────────────────────────
      - name: Install required libraries
        run: |
          arduino-cli lib install "U8g2"
          arduino-cli lib install "ArduinoJson"

          # Stable WebSockets library (IMPORTANT FIX)
          arduino-cli lib install --git-url https://github.com/Links2004/arduinoWebSockets.git

      # ─────────────────────────────
      - name: Verify libraries
        run: arduino-cli lib list

      # ─────────────────────────────
      - name: Compile ESP32-S3 Sketch
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s3 \
            sketch/sketch.ino \
            --output-dir build \
            --clean \
            --verbose

      # ─────────────────────────────
      - name: Upload firmware (.bin)
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-firmware
          path: build/*.bin
