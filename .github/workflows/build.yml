name: Build ESP32-S3-Zero IBMOVS Chat

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Configure Board Manager
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install ESP32 Core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install Libraries
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "U8g2"
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "WebSockets"

      - name: Prepare Sketch Folder
        run: |
          mkdir -p sketch
          [ -f IBMOVS_Chat_v3.ino ] && cp IBMOVS_Chat_v3.ino sketch/sketch.ino || true

      - name: Compile Sketch
        run: |
          arduino-cli compile \
            --fqbn "esp32:esp32:esp32s3:CDCOnBoot=cdc,USBMode=hwcdc,FlashSize=4M,PartitionScheme=default" \
            --build-property build.flash_mode=qio \
            --build-property build.flash_freq=80m \
            --output-dir build \
            ./sketch

      - name: List build output
        run: ls -lh build/

      - name: Rename BIN files
        run: |
          cd build
          for f in *.bin; do
            mv "$f" "IBMOVS_Chat_v3_${f}"
          done
          ls -lh

      - name: Upload BIN Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IBMOVS-Chat-v3-ESP32S3Zero
          path: |
            build/*.bin
            build/*.elf
          retention-days: 30

      - name: Print Build Summary
        run: |
          echo "## Build Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "| File | Flash Address | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------------|------|" >> $GITHUB_STEP_SUMMARY
          for f in build/*.bin; do
            size=$(du -h "$f" | cut -f1)
            name=$(basename "$f")
            if [[ "$name" == *"bootloader"* ]]; then addr="0x0000"
            elif [[ "$name" == *"partitions"* ]]; then addr="0x8000"
            else addr="0x10000"; fi
            echo "| $name | $addr | $size |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Flash ALL 3 BIN files at correct addresses!" >> $GITHUB_STEP_SUMMARY
