name: Build IBMOVS Chat ESP32-S3-Zero

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Configure Board Manager
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls \
          https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install ESP32 Core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install Libraries
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "U8g2"
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "WebSockets"

      # 🔥 FIXED SKETCH DETECTION
      - name: Prepare Sketch Folder
        run: |
          mkdir -p sketch

          if [ -f "sketch/sketch.ino" ]; then
            echo "✅ Using existing sketch/sketch.ino"
          else
            echo "🔍 Searching for .ino file..."
            FILE=$(find . -maxdepth 2 -name "*.ino" ! -path "./sketch/*" | head -n 1)

            if [ -n "$FILE" ]; then
              echo "Found: $FILE"
              cp "$FILE" sketch/sketch.ino
            else
              echo "❌ No .ino file found!"
              ls -R
              exit 1
            fi
          fi

          ls -lh sketch/

      # 🔥 FIXED FQBN
      - name: Compile Sketch
        run: |
          arduino-cli compile \
            --fqbn "esp32:esp32:esp32s3:CDCOnBoot=cdc,USBMode=hwcdc,FlashSize=4M,PartitionScheme=default,FlashFreq=80M,FlashMode=qio" \
            --output-dir build \
            ./sketch

      - name: List build output
        run: |
          if [ -d build ]; then
            ls -lh build/
          else
            echo "❌ Build folder not found!"
            exit 1
          fi

      # 🔥 SAFE RENAME
      - name: Rename BIN files
        run: |
          if ls build/*.bin 1> /dev/null 2>&1; then
            cd build
            for f in *.bin; do
              mv "$f" "IBMOVS_v3_${f}"
            done
            ls -lh
          else
            echo "❌ No BIN files found!"
            exit 1
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IBMOVS-Chat-v3-Bins
          path: build/*.bin
          retention-days: 30

      # 🔥 CLEAN SUMMARY
      - name: Build Summary
        run: |
          echo "## ✅ Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Address | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|------|" >> $GITHUB_STEP_SUMMARY

          for f in build/*.bin; do
            name=$(basename "$f")
            size=$(du -h "$f" | cut -f1)

            if [[ "$name" == *"bootloader"* ]]; then
              addr="0x0000"
            elif [[ "$name" == *"partition"* ]]; then
              addr="0x8000"
            else
              addr="0x10000"
            fi

            echo "| $name | \`$addr\` | $size |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Flash ALL files correctly using esptool or ESPFlash" >> $GITHUB_STEP_SUMMARY
